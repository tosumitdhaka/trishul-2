services:

  traefik:
    image: traefik:v3
    mem_limit: 64m
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=ERROR"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - trishul-net

  core-api:
    build:
      context: .
      dockerfile: Dockerfile
    mem_limit: 150m
    restart: unless-stopped
    environment:
      APP_ENV:       lab
      LOG_LEVEL:     INFO
      STORAGE_MODE:  lab
      JWT_SECRET:    ${JWT_SECRET}
      NATS_URL:      nats://nats:4222
      REDIS_URL:     redis://redis:6379
      INFLUX_URL:    http://influxdb:8086
      INFLUX_TOKEN:  ${INFLUX_TOKEN}
      INFLUX_ORG:    trishul
      INFLUX_BUCKET: fcaps_pm
      VICTORIA_URL:  http://victorialogs:9428
      SQLITE_PATH:   /data/fcaps.db
    volumes:
      - sqlite-data:/data
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      victorialogs:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`) || Path(`/health`) || Path(`/metrics`) || PathPrefix(`/ws`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    networks:
      - trishul-net

  shell-ui:
    build:
      context: ./ui/shell
      dockerfile: Dockerfile
    mem_limit: 32m
    restart: unless-stopped
    depends_on:
      - core-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ui.priority=1"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.services.ui.loadbalancer.server.port=80"
    networks:
      - trishul-net

  nats:
    image: nats:2.10-alpine
    mem_limit: 64m
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trishul-net

  redis:
    image: redis:7-alpine
    mem_limit: 64m
    restart: unless-stopped
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - trishul-net

  influxdb:
    image: influxdb:2-alpine
    mem_limit: 200m
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_ORG:         trishul
      DOCKER_INFLUXDB_INIT_BUCKET:      fcaps_pm
      DOCKER_INFLUXDB_INIT_RETENTION:   30d
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influx-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - trishul-net

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    mem_limit: 128m
    restart: unless-stopped
    command:
      - "-storageDataPath=/vlogs-data"
      - "-retentionPeriod=30d"
      - "-httpListenAddr=:9428"
    volumes:
      - vlogs-data:/vlogs-data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vlogs.rule=PathPrefix(`/vlogs`)"
      - "traefik.http.services.vlogs.loadbalancer.server.port=9428"
    networks:
      - trishul-net

volumes:
  nats-data:
  influx-data:
  vlogs-data:
  sqlite-data:

networks:
  trishul-net:
    driver: bridge
