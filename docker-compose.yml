services:

  traefik:
    image: traefik:v3
    mem_limit: 64m
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=ERROR"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - trishul-net

  core-api:
    build:
      context: .
      dockerfile: Dockerfile
    mem_limit: 150m
    restart: unless-stopped
    environment:
      APP_ENV:       lab
      LOG_LEVEL:     INFO
      STORAGE_MODE:  lab
      JWT_SECRET:    ${JWT_SECRET}
      NATS_URL:      nats://nats:4222
      REDIS_URL:     redis://redis:6379
      INFLUX_URL:    http://influxdb:8086
      INFLUX_TOKEN:  ${INFLUX_TOKEN}
      INFLUX_ORG:    trishul
      INFLUX_BUCKET: fcaps_pm
      VICTORIA_URL:  http://victorialogs:9428
      SQLITE_PATH:   /data/fcaps.db
    volumes:
      - sqlite-data:/data
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      victorialogs:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`) || Path(`/health`) || Path(`/metrics`) || PathPrefix(`/ws`)"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    networks:
      - trishul-net

  shell-ui:
    build:
      context: ./ui/shell
      dockerfile: Dockerfile
    mem_limit: 32m
    restart: unless-stopped
    depends_on:
      - core-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=PathPrefix(`/`) && !PathPrefix(`/mfe`)"
      - "traefik.http.routers.ui.priority=1"
      - "traefik.http.services.ui.loadbalancer.server.port=80"
    networks:
      - trishul-net

  # ── MFE remotes ────────────────────────────────────────────────────────────────────

  fm-console:
    build:
      context: ./ui/mfe/fm-console
      dockerfile: ../Dockerfile.mfe
    mem_limit: 32m
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fm-console.rule=PathPrefix(`/mfe/fm-console`)"
      - "traefik.http.routers.fm-console.priority=5"
      - "traefik.http.middlewares.fm-strip.stripprefix.prefixes=/mfe/fm-console"
      - "traefik.http.routers.fm-console.middlewares=fm-strip"
      - "traefik.http.services.fm-console.loadbalancer.server.port=80"
    networks:
      - trishul-net

  pm-dashboard:
    build:
      context: ./ui/mfe/pm-dashboard
      dockerfile: ../Dockerfile.mfe
    mem_limit: 32m
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pm-dashboard.rule=PathPrefix(`/mfe/pm-dashboard`)"
      - "traefik.http.routers.pm-dashboard.priority=5"
      - "traefik.http.middlewares.pm-strip.stripprefix.prefixes=/mfe/pm-dashboard"
      - "traefik.http.routers.pm-dashboard.middlewares=pm-strip"
      - "traefik.http.services.pm-dashboard.loadbalancer.server.port=80"
    networks:
      - trishul-net

  log-viewer:
    build:
      context: ./ui/mfe/log-viewer
      dockerfile: ../Dockerfile.mfe
    mem_limit: 32m
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.log-viewer.rule=PathPrefix(`/mfe/log-viewer`)"
      - "traefik.http.routers.log-viewer.priority=5"
      - "traefik.http.middlewares.log-strip.stripprefix.prefixes=/mfe/log-viewer"
      - "traefik.http.routers.log-viewer.middlewares=log-strip"
      - "traefik.http.services.log-viewer.loadbalancer.server.port=80"
    networks:
      - trishul-net

  snmp-ui:
    build:
      context: ./ui/mfe/snmp-ui
      dockerfile: ../Dockerfile.mfe
    mem_limit: 32m
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.snmp-ui.rule=PathPrefix(`/mfe/snmp`)"
      - "traefik.http.routers.snmp-ui.priority=5"
      - "traefik.http.middlewares.snmp-strip.stripprefix.prefixes=/mfe/snmp"
      - "traefik.http.routers.snmp-ui.middlewares=snmp-strip"
      - "traefik.http.services.snmp-ui.loadbalancer.server.port=80"
    networks:
      - trishul-net

  ves-ui:
    build:
      context: ./ui/mfe/ves-ui
      dockerfile: ../Dockerfile.mfe
    mem_limit: 32m
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ves-ui.rule=PathPrefix(`/mfe/ves`)"
      - "traefik.http.routers.ves-ui.priority=5"
      - "traefik.http.middlewares.ves-strip.stripprefix.prefixes=/mfe/ves"
      - "traefik.http.routers.ves-ui.middlewares=ves-strip"
      - "traefik.http.services.ves-ui.loadbalancer.server.port=80"
    networks:
      - trishul-net

  webhook-ui:
    build:
      context: ./ui/mfe/webhook-ui
      dockerfile: ../Dockerfile.mfe
    mem_limit: 32m
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webhook-ui.rule=PathPrefix(`/mfe/webhook`)"
      - "traefik.http.routers.webhook-ui.priority=5"
      - "traefik.http.middlewares.webhook-strip.stripprefix.prefixes=/mfe/webhook"
      - "traefik.http.routers.webhook-ui.middlewares=webhook-strip"
      - "traefik.http.services.webhook-ui.loadbalancer.server.port=80"
    networks:
      - trishul-net

  protobuf-ui:
    build:
      context: ./ui/mfe/protobuf-ui
      dockerfile: ../Dockerfile.mfe
    mem_limit: 32m
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.protobuf-ui.rule=PathPrefix(`/mfe/protobuf`)"
      - "traefik.http.routers.protobuf-ui.priority=5"
      - "traefik.http.middlewares.proto-strip.stripprefix.prefixes=/mfe/protobuf"
      - "traefik.http.routers.protobuf-ui.middlewares=proto-strip"
      - "traefik.http.services.protobuf-ui.loadbalancer.server.port=80"
    networks:
      - trishul-net

  sftp-avro-ui:
    build:
      context: ./ui/mfe/sftp-avro-ui
      dockerfile: ../Dockerfile.mfe
    mem_limit: 32m
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sftp-avro-ui.rule=PathPrefix(`/mfe/sftp`) || PathPrefix(`/mfe/avro`)"
      - "traefik.http.routers.sftp-avro-ui.priority=5"
      - "traefik.http.middlewares.sftp-strip.stripprefix.prefixes=/mfe/sftp,/mfe/avro"
      - "traefik.http.routers.sftp-avro-ui.middlewares=sftp-strip"
      - "traefik.http.services.sftp-avro-ui.loadbalancer.server.port=80"
    networks:
      - trishul-net

  nats:
    image: nats:2.10-alpine
    mem_limit: 64m
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trishul-net

  redis:
    image: redis:7-alpine
    mem_limit: 64m
    restart: unless-stopped
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - trishul-net

  influxdb:
    image: influxdb:2-alpine
    mem_limit: 300m
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    ${INFLUX_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD:    ${INFLUX_ADMIN_PASSWORD:-trishul-admin-pass}
      DOCKER_INFLUXDB_INIT_ORG:         trishul
      DOCKER_INFLUXDB_INIT_BUCKET:      fcaps_pm
      DOCKER_INFLUXDB_INIT_RETENTION:   30d
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-trishul-dev-token}
    volumes:
      - influx-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - trishul-net

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    mem_limit: 128m
    restart: unless-stopped
    command:
      - "-storageDataPath=/vlogs-data"
      - "-retentionPeriod=30d"
      - "-httpListenAddr=:9428"
    volumes:
      - vlogs-data:/vlogs-data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vlogs.rule=PathPrefix(`/vlogs`)"
      - "traefik.http.services.vlogs.loadbalancer.server.port=9428"
    networks:
      - trishul-net

volumes:
  nats-data:
  influx-data:
  vlogs-data:
  sqlite-data:

networks:
  trishul-net:
    driver: bridge
